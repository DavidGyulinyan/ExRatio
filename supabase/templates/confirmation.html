<html>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5">
    <h2 style="margin-top: 0">Confirm your signup</h2>

    <p><strong>Your confirmation code</strong> (enter it in the app):</p>
    <p
      style="
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 6px;
        margin: 16px 0;
        font-family: ui-monospace, monospace;
      "
    >
      {{ .Token }}
    </p>

    <p style="color: #444; font-size: 14px">
      Հավելվածում մուտքագրեք վերևի կոդը, կամ սեղմեք ստորևի հղումը։ /
      Enter the code above in the app, or use the link below.
    </p>

    <p><a href="{{ .ConfirmationURL }}" style="color: #2563eb">Confirm by link</a></p>

    <p style="color: #666; font-size: 12px; margin-top: 24px">{{ .Email }}</p>
  </body>
</html>
